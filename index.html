<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#6B1D3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AD Finanças">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192x192.png">
<link rel="icon" type="image/png" href="icon-192x192.png">
<title>Gestão Financeira - AD Belém</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#f8f5f6;color:#2d2d2d;min-height:100vh;padding-bottom:75px}
:root{--w1:#6B1D3A;--w2:#8B2252;--w3:#4A0E2B;--green:#16a34a;--red:#dc2626;--blue:#1d4ed8}

/* HEADER */
.header{background:linear-gradient(135deg,var(--w3) 0%,var(--w1) 50%,var(--w2) 100%);border-radius:0 0 32px 32px;padding:20px 20px 26px;color:#fff;box-shadow:0 6px 24px rgba(107,29,58,0.4)}
.h-top{display:flex;align-items:center;gap:14px}
.h-logo{width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.35))}
.h-title{font-size:18px;font-weight:800}
.h-sub{font-size:10px;opacity:.75;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-top:1px}
.verse{margin-top:18px;background:rgba(255,255,255,.12);border-radius:16px;padding:16px 20px;backdrop-filter:blur(10px)}
.verse p{font-size:14px;font-style:italic;line-height:1.55;opacity:.95}
.verse .ref{font-size:12px;font-weight:700;opacity:.8;margin-top:8px;font-style:normal}
.desk-nav{display:none;gap:6px}

/* SYNC */
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:8px;flex-wrap:wrap}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#ccc}
.sync-txt{font-size:11px;color:#888;display:flex;align-items:center;gap:5px}
.btn-sync{background:var(--w1);color:#fff;border:none;padding:7px 16px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-sync:active{opacity:.8}

/* INSTALL */
.install-bar{background:linear-gradient(135deg,var(--w1),var(--w2));color:#fff;border-radius:16px;padding:14px 18px;margin:0 16px 10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.install-bar .i-txt{flex:1;font-size:13px;font-weight:600}
.install-bar .i-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;color:#fff;white-space:nowrap}
.install-bar.hide{display:none}

/* TABS */
.tab-nav{display:flex;gap:6px;padding:4px 16px;overflow-x:auto;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tbtn{background:#fff;color:#888;border:1px solid #e8e0e4;padding:8px 16px;border-radius:22px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.tbtn.on{background:var(--w1);color:#fff;border-color:var(--w1);font-weight:700;box-shadow:0 3px 12px rgba(107,29,58,.3)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0e8eb;display:flex;justify-content:space-around;align-items:center;padding:4px 0 max(6px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.bb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 14px;color:#bbb;font-size:10px;font-weight:500}
.bb.on{color:var(--w1);font-weight:700}
.bb .ind{width:22px;height:3px;border-radius:2px;background:var(--w1);margin-top:1px;display:none}
.bb.on .ind{display:block}

/* MAIN */
.main{max-width:600px;margin:0 auto;padding:14px 16px}

/* CARDS */
.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(107,29,58,.06);border:1px solid #f2eaed}
.scard{padding:16px;border-left:4px solid var(--w1)}
.scard .sico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.scard .slbl{font-size:11px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.3px;line-height:1.3}
.scard .sval{font-size:22px;font-weight:900;margin-top:8px}
.scard .ssub{font-size:10px;color:#aaa;font-weight:600;margin-top:4px}

.hero{background:linear-gradient(135deg,var(--w3),var(--w2));color:#fff;text-align:center;padding:22px 18px;border:none;border-left:none}
.calc{background:linear-gradient(135deg,#f0fdf4,#ecfdf5);border-left:4px solid var(--green)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fs{grid-column:1/-1}

/* FORM */
.lbl{display:block;font-size:11px;font-weight:700;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.inp{padding:10px 14px;border-radius:12px;border:1px solid #e0d5d9;font-size:14px;outline:none;width:100%;background:#faf8f9;font-family:inherit;transition:border .2s}
.inp:focus{border-color:var(--w1)}
.ibig{font-size:22px;font-weight:800;text-align:center;padding:16px}
.bpri{margin-top:14px;padding:14px;background:var(--w1);color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;width:100%;letter-spacing:.3px;box-shadow:0 4px 14px rgba(107,29,58,.27);font-family:inherit}
.bpri:active{opacity:.85}
.bred{background:var(--red);box-shadow:0 4px 14px rgba(220,38,38,.27)}
.bgrn{background:var(--green);box-shadow:0 4px 14px rgba(22,163,74,.27);margin-top:0}

/* DEST */
.dbtn{background:#faf8f9;border:2px solid #eae2e5;border-radius:16px;padding:16px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s;font-family:inherit}
.dbtn.on{background:rgba(107,29,58,.06);border-color:var(--w1)}
.dico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.dlbl{font-size:13px;font-weight:700;color:#888}
.dbtn.on .dlbl{color:var(--w1)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 10px;font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #f0e8eb}
.tbl td{padding:10px 12px;border-bottom:1px solid #f8f4f5}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;display:inline-block}
.del{background:none;border:none;cursor:pointer;font-size:15px;padding:2px}
.empty{color:#ccc;text-align:center;padding:24px;font-size:13px}
.ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fr .inp{width:auto;padding:6px 10px;font-size:12px}
.fr input[type=number]{width:72px}
.chart-wrap{position:relative;width:100%;margin-top:10px}

/* DESKTOP */
@media(min-width:768px){
  .header{border-radius:0 0 40px 40px;padding:24px 40px 32px;max-width:1200px;margin:0 auto}
  .h-logo{width:56px;height:56px}
  .h-title{font-size:22px}
  .h-sub{font-size:12px}
  .verse p{font-size:15px}
  .desk-nav{display:flex !important}
  .tab-nav,.bnav{display:none !important}
  .main{max-width:1100px;padding:20px 40px}
  body{padding-bottom:20px}
  .g4{grid-template-columns:repeat(4,1fr);gap:14px}
  .d2{display:grid !important;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  .install-bar{max-width:1100px;margin:0 auto 10px}
  .sync-bar{max-width:1100px;margin:0 auto}
}
</style>
</head>

const MF=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const CATS=["Aluguel","Água","Luz","Internet","Manutenção","Limpeza","Sonorização","Instrumentos","Eventos","Assistência Social","Salários","Transporte","Alimentação","Outros"];
const SVG={
  home:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  perc:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>',
  cash:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  chart:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>'
};
const TABS=[{id:"inicio",l:"Início",s:SVG.home},{id:"entradas",l:"Dízimos",s:SVG.perc},{id:"gastos",l:"Gastos",s:SVG.cash},{id:"comp",l:"Relatórios",s:SVG.chart}];

let D={ent:[],gas:[]}, tab="inicio", CX={}, dp=null;
const now=new Date(), CM=now.getMonth(), CY=now.getFullYear();
const fmt=v=>v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

function save(){localStorage.setItem("igreja_fin",JSON.stringify(D));}
function load(){try{const s=localStorage.getItem("igreja_fin");if(s)D=JSON.parse(s);}catch(e){}}

// NAV
function nav(){
  document.getElementById("tNav").innerHTML=TABS.map(t=>`<button class="tbtn ${tab===t.id?'on':''}" onclick="go('${t.id}')">${t.l}</button>`).join("");
  document.getElementById("dNav").innerHTML=TABS.map(t=>`<button style="background:${tab===t.id?'rgba(255,255,255,.2)':'rgba(255,255,255,.08)'};color:#fff;border:${tab===t.id?'2px solid rgba(255,255,255,.5)':'2px solid transparent'};padding:10px 22px;border-radius:24px;font-size:13px;font-weight:${tab===t.id?800:600};cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit" onclick="go('${t.id}')">${t.s}<span>${t.l}</span></button>`).join("");
  document.getElementById("bNav").innerHTML=TABS.map(t=>`<button class="bb ${tab===t.id?'on':''}" onclick="go('${t.id}')">${t.s}<span style="margin-top:1px">${t.l}</span><div class="ind"></div></button>`).join("");
}
function go(id){tab=id;nav();rend();}

// RENDER
function rend(){
  Object.values(CX).forEach(c=>{try{c.destroy();}catch(e){}});CX={};
  const m=document.getElementById("mc");
  if(tab==="inicio"){m.innerHTML=rInicio();iInicio();}
  else if(tab==="entradas"){m.innerHTML=rEnt();}
  else if(tab==="gastos"){m.innerHTML=rGas();}
  else{m.innerHTML=rComp();iComp();}
}

function sc(ico,bg,lbl,val,clr,acc,sub){
  return `<div class="card scard" style="border-left-color:${acc}"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div class="sico" style="background:${bg}">${ico}</div><span class="slbl">${lbl}</span></div><p class="sval" style="color:${clr}">${val}</p>${sub?`<p class="ssub">${sub}</p>`:""}</div>`;
}

// ── INÍCIO ──
function rInicio(){
  const em=D.ent.filter(e=>e.mes===CM&&e.ano===CY);
  const dizM=em.filter(e=>e.tipo==="dizimo").reduce((s,e)=>s+e.valor,0);
  const ofM=em.filter(e=>e.tipo==="oferta").reduce((s,e)=>s+e.valor,0);
  const teA=D.ent.filter(e=>e.ano===CY).reduce((s,e)=>s+e.valor,0);
  const gM=D.gas.filter(g=>g.mes===CM&&g.ano===CY).reduce((s,g)=>s+g.valor,0);
  const sM=dizM+ofM-gM;
  const tE=D.ent.reduce((s,e)=>s+e.valor,0);
  const tG=D.gas.reduce((s,g)=>s+g.valor,0);
  const sG=tE-tG;
  return `<div class="g4">
    ${sc("💰","#fef3c7","Dízimos este mês",fmt(dizM),"var(--w1)","#d4a017",MF[CM])}
    ${sc("🎁","#fee2e2","Ofertas este mês",fmt(ofM),"var(--w2)","#e85d75",MF[CM])}
    ${sc("📊","#dbeafe","Total este ano",fmt(teA),"var(--blue)","#3b82f6",String(CY))}
    ${sc("🎯","#fef9c3","Saldo do mês",fmt(sM),sM>=0?"var(--green)":"var(--red)","#f59e0b",MF[CM])}
  </div>
  <div class="d2" style="display:block">
    <div class="card hero"><div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px"><div class="ico" style="background:rgba(255,255,255,.18);width:38px;height:38px">💎</div><span style="font-size:13px;opacity:.8;text-transform:uppercase;letter-spacing:1.5px;font-weight:700">Saldo Total Geral</span></div><p style="font-size:32px;font-weight:900">${fmt(sG)}</p><p style="margin-top:6px;font-size:11px;opacity:.5">Todos os períodos acumulados</p></div>
    <div class="card calc"><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><div class="ico" style="background:#dcfce7;width:36px;height:36px">🧮</div><p style="font-size:15px;font-weight:800;color:#333">Calculadora Rápida de Dízimo</p></div><label class="lbl">Valor da Renda</label><input type="text" inputmode="decimal" class="inp" id="rcalc" placeholder="R$ 0,00" style="font-size:16px;padding:14px;background:#fff;margin-bottom:12px" oninput="cDiz()"><div style="background:#fff;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:14px;color:#555;font-weight:600">Dízimo (10%):</span><span id="dcv" style="font-size:22px;font-weight:900;color:var(--w1)">R$ 0,00</span></div><button class="bpri bgrn" onclick="rDiz()">+ Registrar este Dízimo</button></div>
  </div>
  <div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="ico" style="background:#ede9fe;width:32px;height:32px">📈</div><p style="font-size:13px;font-weight:700;color:#444">Entradas vs Gastos — ${CY}</p></div><div class="chart-wrap"><canvas id="ch0" height="200"></canvas></div></div>`;
}
function cDiz(){const v=parseFloat((document.getElementById("rcalc").value||"0").replace(",","."))||0;document.getElementById("dcv").textContent=fmt(v*.1);}
function rDiz(){const v=parseFloat((document.getElementById("rcalc").value||"0").replace(",","."))||0;if(v<=0)return;D.ent.push({id:Date.now(),tipo:"dizimo",valor:v*.1,descricao:"Dízimo (calculadora)",mes:CM,ano:CY,dia:now.getDate()});save();rend();}
function iInicio(){
  const c=document.getElementById("ch0");if(!c)return;
  const eD=MS.map((_,i)=>D.ent.filter(e=>e.mes===i&&e.ano===CY).reduce((s,e)=>s+e.valor,0));
  const gD=MS.map((_,i)=>D.gas.filter(g=>g.mes===i&&g.ano===CY).reduce((s,g)=>s+g.valor,0));
  CX.c0=new Chart(c,{type:"bar",data:{labels:MS,datasets:[{label:"Entradas",data:eD,backgroundColor:"#16a34a",borderRadius:5},{label:"Gastos",data:gD,backgroundColor:"#ef4444",borderRadius:5}]},options:cOpt()});
}
function cOpt(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:"Nunito",size:10}}}},scales:{x:{ticks:{font:{family:"Nunito",size:9}}},y:{ticks:{font:{family:"Nunito",size:9},callback:v=>v.toLocaleString("pt-BR")}}}};}

// ── ENTRADAS ──
let eF=CM,eA=CY,eT="dizimo";
function rEnt(){
  const fl=D.ent.filter(e=>e.mes===eF&&e.ano===eA).sort((a,b)=>b.dia-a.dia);
  return `<div class="d2" style="display:block">
  <div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><div class="ico" style="background:rgba(107,29,58,.08);width:36px;height:36px">✝️</div><p style="font-size:16px;font-weight:800;color:var(--w1)">Lançar Dízimos e Ofertas</p></div>
    <label class="lbl">Destino da entrada</label>
    <div class="g2" style="margin-bottom:16px">
      <button class="dbtn ${eT==="dizimo"?"on":""}" onclick="eT='dizimo';rend()"><div class="dico" style="background:#fef3c7">💰</div><span class="dlbl">Dízimo</span></button>
      <button class="dbtn ${eT==="oferta"?"on":""}" onclick="eT='oferta';rend()"><div class="dico" style="background:#fee2e2">🎁</div><span class="dlbl">Oferta</span></button>
    </div>
    <div class="g2">
      <div class="fs"><label class="lbl">Valor (R$)</label><input type="text" inputmode="decimal" class="inp ibig" id="eV" placeholder="R$ 0,00"></div>
      <div><label class="lbl">Dia</label><input type="number" class="inp" id="eD" value="${now.getDate()}" min="1" max="31"></div>
      <div><label class="lbl">Mês</label><select class="inp" id="eM">${MS.map((m,i)=>`<option value="${i}"${i===CM?" selected":""}>${m}</option>`).join("")}</select></div>
      <div><label class="lbl">Ano</label><input type="number" class="inp" id="eY" value="${CY}"></div>
      <div><label class="lbl">Descrição</label><input type="text" class="inp" id="eDs" placeholder="Ex: Dízimo João"></div>
    </div>
    <button class="bpri" onclick="aE()">+ Adicionar Entrada</button>
  </div>
  <div class="card"><div class="fr"><div class="ico" style="background:#ede9fe;width:30px;height:30px;font-size:14px">📋</div><p style="font-size:14px;font-weight:700;flex:1;min-width:80px">Registros</p><select class="inp" onchange="eF=+this.value;rend()">${MS.map((m,i)=>`<option value="${i}"${i===eF?" selected":""}>${m}</option>`).join("")}</select><input type="number" class="inp" value="${eA}" onchange="eA=+this.value;rend()"></div>
    ${fl.length===0?'<p class="empty">Nenhum registro neste período</p>':`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Dia</th><th>Tipo</th><th>Desc.</th><th style="text-align:right">Valor</th><th style="text-align:center;width:50px">×</th></tr></thead><tbody>${fl.map(e=>`<tr><td>${String(e.dia).padStart(2,"0")}</td><td><span class="badge" style="background:${e.tipo==="dizimo"?"#fef3c7":"#fee2e2"};color:${e.tipo==="dizimo"?"#92400e":"#991b1b"}">${e.tipo==="dizimo"?"Dízimo":"Oferta"}</span></td><td>${e.descricao||""}</td><td style="text-align:right;font-weight:700;color:var(--green)">${fmt(e.valor)}</td><td style="text-align:center"><button class="del" onclick="xDel('ent',${e.id})">🗑️</button></td></tr>`).join("")}</tbody></table></div>`}
  </div></div>`;
}
function aE(){const v=parseFloat((document.getElementById("eV").value||"0").replace(",","."))||0;if(v<=0)return alert("Informe um valor");D.ent.push({id:Date.now(),tipo:eT,valor:v,descricao:document.getElementById("eDs").value||(eT==="dizimo"?"Dízimo":"Oferta"),mes:+document.getElementById("eM").value,ano:+document.getElementById("eY").value,dia:+document.getElementById("eD").value});save();rend();}

// ── GASTOS ──
let gF=CM,gA=CY;
function rGas(){
  const fl=D.gas.filter(g=>g.mes===gF&&g.ano===gA).sort((a,b)=>b.dia-a.dia);
  const tot=fl.reduce((s,g)=>s+g.valor,0);
  return `<div class="d2" style="display:block">
  <div class="card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><div class="ico" style="background:#fee2e2;width:36px;height:36px">💸</div><p style="font-size:16px;font-weight:800;color:var(--red)">Registrar Gastos</p></div>
    <div class="g2">
      <div class="fs"><label class="lbl">Categoria</label><select class="inp" id="gC">${CATS.map(c=>`<option>${c}</option>`).join("")}</select></div>
      <div class="fs"><label class="lbl">Valor (R$)</label><input type="text" inputmode="decimal" class="inp ibig" id="gV" placeholder="R$ 0,00"></div>
      <div><label class="lbl">Dia</label><input type="number" class="inp" id="gD" value="${now.getDate()}" min="1" max="31"></div>
      <div><label class="lbl">Mês</label><select class="inp" id="gM">${MS.map((m,i)=>`<option value="${i}"${i===CM?" selected":""}>${m}</option>`).join("")}</select></div>
      <div><label class="lbl">Ano</label><input type="number" class="inp" id="gY" value="${CY}"></div>
      <div><label class="lbl">Descrição</label><input type="text" class="inp" id="gDs" placeholder="Ex: Conta de luz"></div>
    </div>
    <button class="bpri bred" onclick="aG()">+ Adicionar Gasto</button>
  </div>
  <div class="card"><div class="fr"><div class="ico" style="background:#fee2e2;width:30px;height:30px;font-size:14px">📋</div><p style="font-size:14px;font-weight:700;flex:1;min-width:80px">Gastos <span style="color:var(--red);font-weight:800">${fmt(tot)}</span></p><select class="inp" onchange="gF=+this.value;rend()">${MS.map((m,i)=>`<option value="${i}"${i===gF?" selected":""}>${m}</option>`).join("")}</select><input type="number" class="inp" value="${gA}" onchange="gA=+this.value;rend()"></div>
    ${fl.length===0?'<p class="empty">Nenhum gasto neste período</p>':`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Dia</th><th>Cat.</th><th>Desc.</th><th style="text-align:right">Valor</th><th style="text-align:center;width:50px">×</th></tr></thead><tbody>${fl.map(g=>`<tr><td>${String(g.dia).padStart(2,"0")}</td><td><span class="badge" style="background:#fee2e2;color:#991b1b">${g.categoria}</span></td><td>${g.descricao||""}</td><td style="text-align:right;font-weight:700;color:var(--red)">${fmt(g.valor)}</td><td style="text-align:center"><button class="del" onclick="xDel('gas',${g.id})">🗑️</button></td></tr>`).join("")}</tbody></table></div>`}
  </div></div>`;
}
function aG(){const v=parseFloat((document.getElementById("gV").value||"0").replace(",","."))||0;if(v<=0)return alert("Informe um valor");D.gas.push({id:Date.now(),valor:v,categoria:document.getElementById("gC").value,descricao:document.getElementById("gDs").value||document.getElementById("gC").value,mes:+document.getElementById("gM").value,ano:+document.getElementById("gY").value,dia:+document.getElementById("gD").value});save();rend();}

function xDel(t,id){if(!confirm("Excluir este registro?"))return;if(t==="ent")D.ent=D.ent.filter(e=>e.id!==id);else D.gas=D.gas.filter(g=>g.id!==id);save();rend();}

// ── COMPARATIVO ──
let cY=CY;
function gYrs(){const s=new Set();D.ent.forEach(e=>s.add(e.ano));D.gas.forEach(g=>s.add(g.ano));if(!s.size)s.add(CY);return[...s].sort();}
function rComp(){
  const yrs=gYrs();
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div style="display:flex;align-items:center;gap:8px"><div class="ico" style="background:#ede9fe;width:34px;height:34px;font-size:16px">📊</div><p style="font-size:18px;font-weight:800">Relatórios</p></div><select class="inp" style="width:auto;padding:8px 16px;font-size:14px" onchange="cY=+this.value;rend()">${yrs.map(y=>`<option value="${y}"${y===cY?" selected":""}>${y}</option>`).join("")}</select></div>
  <div class="d2" style="display:block"><div class="card"><p style="margin-bottom:10px;font-size:13px;font-weight:700;color:#444">Gastos por Mês — ${cY}</p><div class="chart-wrap"><canvas id="cG" height="200"></canvas></div></div><div class="card"><p style="margin-bottom:10px;font-size:13px;font-weight:700;color:#444">Saldo por Mês — ${cY}</p><div class="chart-wrap"><canvas id="cS" height="200"></canvas></div></div></div>
  <div class="card"><p style="margin-bottom:10px;font-size:13px;font-weight:700;color:#444">Evolução Mensal — ${cY}</p><div class="chart-wrap"><canvas id="cE" height="200"></canvas></div></div>
  ${yrs.length>0?`<div class="d2" style="display:block"><div class="card"><p style="margin-bottom:10px;font-size:13px;font-weight:700;color:#444">Comparativo Anual</p><div class="chart-wrap"><canvas id="cA" height="200"></canvas></div></div>
  <div class="card"><p style="margin-bottom:10px;font-size:13px;font-weight:700;color:#444">Resumo Anual</p><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Ano</th><th style="text-align:right">Entradas</th><th style="text-align:right">Gastos</th><th style="text-align:right">Saldo</th></tr></thead><tbody>${yrs.map(y=>{const en=D.ent.filter(e=>e.ano===y).reduce((s,e)=>s+e.valor,0);const ga=D.gas.filter(g=>g.ano===y).reduce((s,g)=>s+g.valor,0);const sl=en-ga;return`<tr><td style="font-weight:700">${y}</td><td style="text-align:right;color:var(--green);font-weight:700">${fmt(en)}</td><td style="text-align:right;color:var(--red);font-weight:700">${fmt(ga)}</td><td style="text-align:right;color:${sl>=0?"var(--green)":"var(--red)"};font-weight:800">${fmt(sl)}</td></tr>`;}).join("")}</tbody></table></div></div></div>`:""}`;
}
function iComp(){
  const eD=MS.map((_,i)=>D.ent.filter(e=>e.mes===i&&e.ano===cY).reduce((s,e)=>s+e.valor,0));
  const gD=MS.map((_,i)=>D.gas.filter(g=>g.mes===i&&g.ano===cY).reduce((s,g)=>s+g.valor,0));
  const sD=MS.map((_,i)=>eD[i]-gD[i]);
  const o=cOpt();
  const c1=document.getElementById("cG");if(c1)CX.g=new Chart(c1,{type:"bar",data:{labels:MS,datasets:[{label:"Gastos",data:gD,backgroundColor:"#ef4444",borderRadius:5}]},options:o});
  const c2=document.getElementById("cS");if(c2)CX.s=new Chart(c2,{type:"bar",data:{labels:MS,datasets:[{label:"Saldo",data:sD,backgroundColor:sD.map(v=>v>=0?"#6B1D3A":"#ef4444"),borderRadius:5}]},options:o});
  const c3=document.getElementById("cE");if(c3)CX.e=new Chart(c3,{type:"line",data:{labels:MS,datasets:[{label:"Entradas",data:eD,borderColor:"#16a34a",borderWidth:2.5,pointRadius:3,fill:false},{label:"Gastos",data:gD,borderColor:"#ef4444",borderWidth:2.5,pointRadius:3,fill:false},{label:"Saldo",data:sD,borderColor:"#6B1D3A",borderWidth:2.5,pointRadius:3,fill:false}]},options:{...o,elements:{line:{tension:.3}}}});
  const yrs=gYrs();
  const yE=yrs.map(y=>D.ent.filter(e=>e.ano===y).reduce((s,e)=>s+e.valor,0));
  const yG=yrs.map(y=>D.gas.filter(g=>g.ano===y).reduce((s,g)=>s+g.valor,0));
  const yS=yrs.map((_,i)=>yE[i]-yG[i]);
  const c4=document.getElementById("cA");if(c4)CX.a=new Chart(c4,{type:"bar",data:{labels:yrs.map(String),datasets:[{label:"Entradas",data:yE,backgroundColor:"#16a34a",borderRadius:5},{label:"Gastos",data:yG,backgroundColor:"#ef4444",borderRadius:5},{label:"Saldo",data:yS,backgroundColor:"#6B1D3A",borderRadius:5}]},options:o});
}

// ── SYNC ──
function sUI(st,msg){
  const d=document.getElementById("sDot"),t=document.getElementById("sTxt");
  d.style.background=st==="ok"?"#16a34a":st==="err"?"#dc2626":st==="load"?"#f59e0b":"#ccc";
  t.textContent=msg;
}
function doSync(){
  if(!SCRIPT_URL){alert("Configure a URL do Google Apps Script!\nAbra o arquivo index.html e preencha a variável SCRIPT_URL.");return;}
  sUI("load","Enviando...");
  const u=SCRIPT_URL+"?action=save&callback=_ss&data="+encodeURIComponent(JSON.stringify(D));
  jp(u,"_ss");
}
window._ss=function(r){sUI(r&&r.success?"ok":"err",r&&r.success?"Sincronizado "+new Date().toLocaleTimeString("pt-BR"):"Erro ao sincronizar");};
function loadSheets(){
  if(!SCRIPT_URL)return;sUI("load","Carregando...");
  jp(SCRIPT_URL+"?action=load&callback=_sl","_sl");
}
window._sl=function(r){
  if(r&&r.success&&r.data){try{const rd=typeof r.data==="string"?JSON.parse(r.data):r.data;if(rd.ent||rd.gas){D=rd;save();rend();sUI("ok","Dados carregados");}}catch(e){sUI("err","Erro nos dados");}}
  else sUI("err","Sem dados remotos");
};
function jp(u,cb){const s=document.createElement("script");s.src=u;s.onerror=()=>sUI("err","Erro de conexão");document.body.appendChild(s);setTimeout(()=>{try{document.body.removeChild(s);}catch(e){}},10000);}

// ── PWA ──
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;document.getElementById("instBar").classList.remove("hide");});
function doInstall(){if(dp){dp.prompt();dp.userChoice.then(()=>{document.getElementById("instBar").classList.add("hide");dp=null;});}}

// INIT
load();nav();rend();if(SCRIPT_URL)loadSheets();
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
